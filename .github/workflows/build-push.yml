name: Build and Push Docker Image

on:
  schedule:
    # Every 6 hours
    - cron: '0 */6 * * *'

  workflow_dispatch:
    inputs:
      version:
        description: 'Semaphore version tag (e.g. v2.17.39). Leave blank to use latest.'
        required: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_latest: ${{ steps.version.outputs.tag_latest }}
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: Determine version
        id: version
        run: |
          INPUT="${{ github.event.inputs.version }}"
          if [ -z "$INPUT" ] || [ "$INPUT" = "latest" ]; then
            VERSION=$(curl -fsSL "https://api.github.com/repos/semaphoreui/semaphore/releases/latest" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              | jq -r '.tag_name')
            echo "tag_latest=true" >> "$GITHUB_OUTPUT"
          else
            VERSION="$INPUT"
            echo "tag_latest=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if already built
        id: check
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if docker buildx imagetools inspect "${{ secrets.DOCKER_USERNAME }}/semaphore:$VERSION" > /dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Image ${{ secrets.DOCKER_USERNAME }}/semaphore:$VERSION already exists — skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.skip == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PERSONAL_ACCESS_TOKEN }}

      - name: Set tags
        id: tags
        run: |
          TAGS="${{ secrets.DOCKER_USERNAME }}/semaphore:${{ needs.check.outputs.version }}"

          # Determine if the 'latest' should also be added
          if [ "${{ needs.check.outputs.tag_latest }}" = "true" ]; then
            TAGS="$TAGS,${{ secrets.DOCKER_USERNAME }}/semaphore:latest"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            SEMAPHORE_VERSION=${{ needs.check.outputs.version }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
